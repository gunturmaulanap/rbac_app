services:
  db:
    image: postgres:16-alpine
    container_name: rbac-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rbac_app
      POSTGRES_USER: rbac_app
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rbac_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rbac-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8081:8080"

volumes:
  postgres_data:
